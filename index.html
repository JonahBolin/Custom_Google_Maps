<html>

<head>
    <title>Add a Map using HTML</title>

    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script type="module" src="./index.js"></script>
</head>

<body>
    <gmp-map center="60.63208246505061,17.107778125000014" zoom="5" map-id="57cdce20edf8ebebc3178494"
        style="height: 100%">
    </gmp-map>

    <!--
      The `defer` attribute causes the script to execute after the full HTML
      document has been parsed. -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-y3NCRCwy6Ur7HWDyN04PHF1bobMhCic&libraries=maps"
        defer></script>
</body>

</html>
