<html>

<head>
    <title>Add a Map using HTML</title>

    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script type="module" src="./index.js"></script>
</head>

<body>
    <gmp-map center="62.3835249,17.2800853" zoom="16" map-id="57cdce20edf8ebebc3178494" style="height: 100%">

        <gmp-advanced-marker position="62.3835249, 17.2800853" title="Grogu"> <img src="./Images/grogu.png" alt="Grogu"
                class="grogu_marker">
        </gmp-advanced-marker>
    </gmp-map>



    <!--
      The `defer` attribute causes the script to execute after the full HTML
      document has been parsed. -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-y3NCRCwy6Ur7HWDyN04PHF1bobMhCic&libraries=maps"
        defer></script>
</body>

</html>
